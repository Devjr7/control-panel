<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL PANEL</title>
    <style>
    button {
        margin: 5px;  /*inline css*/   
     }
        body{
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 40px;
}

h1{
    margin-bottom: 20px;
}

button{
    padding: 10px 16px;
    margin: 6px;
    border: none;
    border-radius: 6px;
    background-color: #000000;
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.2);
}

button:hover{
    background-color: #3f9443;
    transform: scale(1.05);
}

button:active{
    transform: scale(0.95);
}
 

    </style>
</head>
<body>
 <h1>CONTROL PANEL</h1>
    <button>DARK</button>
    <button>light</button>
    <button onclick="changeFont1()"> Arial, sans-serif font </button>
    <button onclick="changeFont2()">"Georgia, serif" font </button>
    <button onclick="changeFont3()">"Courier New, monospace" font </button>
    <button onclick="changeFont4()">"Cursive" font </button>
    <button onclick="changeFont5()">"Fantasy" font </button>
    <button onclick="changeFont6()">"Times New Roman, serif" font </button>
    <button onclick="changeFont7()">"Verdana, sans-serif" font </button>
    <button onclick="changeFont8()">"Trebuchet MS, sans-serif" font </button>
    <script src="events.js"></script>
</body>
</html>
